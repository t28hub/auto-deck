pre-commit:
  jobs:
    - name: biome
      glob: '*.{js,ts,cjs,mjs,cts,mts,jsx,tsx,json,jsonc,css}'
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

    - name: gitleaks
      run: |
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "ERROR: gitleaks not installed. See https://github.com/gitleaks/gitleaks#installing" >&2
          exit 1
        fi
        gitleaks git --pre-commit --staged --redact --verbose --no-banner

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
