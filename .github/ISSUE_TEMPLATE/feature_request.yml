name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
assignees: [t28hub]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What you are struggling with and why it matters.
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What you want to happen.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
