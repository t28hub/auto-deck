name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan the git history for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm with the version pinned by packageManager
        uses: pnpm/action-setup@v6

      - name: Setup Node.js with the version declared in package.json
        uses: actions/setup-node@v7
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies with a frozen lockfile
        run: pnpm install --frozen-lockfile
        env:
          LEFTHOOK: "0"

      - name: Lint all files with Biome
        run: pnpm lint

      - name: Typecheck, test, and build all workspaces with Turborepo
        run: pnpm exec turbo typecheck test build
